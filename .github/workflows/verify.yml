name: Verify

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feat/**"
      - "fix/**"
      - "db/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install test dependencies
        run: python -m pip install asyncpg==0.31.0 pytest
      - name: Compile backend
        run: python -m py_compile backend/server.py backend/postgres_database.py backend/app_version.py
      - name: Test PostgreSQL compatibility layer
        run: python -m pytest -q backend/tests/test_postgres_database_compat.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build frontend
        run: npm run build
        env:
          CI: "false"
      - name: Reject local backend URL in production bundle
        run: |
          if grep -R -l -E 'https?://(127\.0\.0\.1|localhost):8002' build/static/js; then
            echo "Production bundle must not contain a local backend URL on port 8002."
            exit 1
          fi
